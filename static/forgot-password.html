<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password — New Age Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script type="text/javascript">
      (function(c,l,a,r,i,t,y){
          c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
          t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
          y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window, document, "clarity", "script", "x13hxsbvnw");
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F5F4F0; --surface: #FFFFFF; --border: #E2E0DA;
      --border-strong: #C8C6BF; --text: #1A1916; --muted: #6B6A65;
      --hint: #9E9C97; --accent: #1A1916; --accent-fg: #FFFFFF;
      --danger-bg: #FEF2F2; --danger-bd: #FECACA; --danger-tx: #B91C1C;
      --success-bg: #F0FDF4; --success-bd: #BBF7D0; --success-tx: #15803D;
      --radius: 10px; --radius-sm: 6px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.06);
    }
    body {
      font-family: 'DM Sans', sans-serif; background: var(--bg);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: radial-gradient(circle, #C8C6BF 1px, transparent 1px);
      background-size: 24px 24px; opacity: 0.45; pointer-events: none; z-index: 0;
    }
    .card {
      position: relative; z-index: 1; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 2.5rem 2rem; width: 100%; max-width: 420px;
      animation: slideUp 0.35s ease both;
    }
    @keyframes slideUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    .logo-area { display:flex; flex-direction:column; align-items:center; margin-bottom:2rem; text-align:center; }
    .logo-box { width:52px; height:52px; background:var(--accent); border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; margin-bottom:1rem; }
    .logo-box svg { width:26px; height:26px; stroke:#fff; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
    .logo-area h1 { font-size:1.125rem; font-weight:600; color:var(--text); }
    .logo-area p  { font-size:0.8125rem; color:var(--muted); margin-top:3px; }
    .alert { display:none; align-items:flex-start; gap:9px; padding:10px 13px; border-radius:var(--radius-sm); font-size:0.8125rem; line-height:1.5; margin-bottom:1.25rem; border:1px solid; }
    .alert.show { display:flex; }
    .alert.error   { background:var(--danger-bg);  border-color:var(--danger-bd);  color:var(--danger-tx); }
    .alert.success { background:var(--success-bg); border-color:var(--success-bd); color:var(--success-tx); }
    .alert svg { flex-shrink:0; width:15px; height:15px; margin-top:1px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .form-group { margin-bottom:1.1rem; }
    label { display:block; font-size:0.8125rem; font-weight:500; color:var(--text); margin-bottom:5px; }
    .input-wrap { position:relative; display:flex; align-items:center; }
    .input-icon { position:absolute; left:11px; pointer-events:none; width:16px; height:16px; stroke:var(--hint); fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
    input { width:100%; height:40px; padding:0 12px 0 36px; font-family:'DM Sans',sans-serif; font-size:0.875rem; color:var(--text); background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); outline:none; transition:border-color 0.15s,box-shadow 0.15s; }
    input:focus { border-color:var(--border-strong); box-shadow:0 0 0 3px rgba(26,25,22,0.07); }
    input::placeholder { color:var(--hint); }
    .btn-submit { width:100%; height:42px; background:var(--accent); color:var(--accent-fg); border:none; border-radius:var(--radius-sm); font-family:'DM Sans',sans-serif; font-size:0.9375rem; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:opacity 0.15s; margin-top:1.5rem; }
    .btn-submit:hover:not(:disabled) { opacity:0.88; }
    .btn-submit:disabled { opacity:0.55; cursor:not-allowed; }
    .spinner { width:16px; height:16px; border:2px solid rgba(255,255,255,0.35); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; display:none; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .footer-note { text-align:center; font-size:0.8rem; color:var(--hint); margin-top:1.5rem; }
    .footer-note a { color:var(--muted); text-decoration:none; border-bottom:1px solid var(--border); }
    .footer-note a:hover { color:var(--text); }
  </style>
</head>
<body>
<div class="card">
  <div class="logo-area">
    <div class="logo-box">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h1>Reset Password</h1>
    <p>Enter your email and set a new password</p>
  </div>

  <div class="alert error" id="errorAlert">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="errorText">Something went wrong.</span>
  </div>

  <div class="alert success" id="successAlert">
    <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    <span id="successText">Password reset successfully!</span>
  </div>

  <div class="form-group">
    <label>Work Email</label>
    <div class="input-wrap">
      <svg class="input-icon" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      <input type="email" id="email" placeholder="you@newage4.com" />
    </div>
  </div>

  <div class="form-group">
    <label>New Password</label>
    <div class="input-wrap">
      <svg class="input-icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <input type="password" id="newPassword" placeholder="Min. 6 characters" />
    </div>
  </div>

  <div class="form-group">
    <label>Confirm New Password</label>
    <div class="input-wrap">
      <svg class="input-icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <input type="password" id="confirmPassword" placeholder="Repeat new password" />
    </div>
  </div>

  <button class="btn-submit" id="submitBtn" onclick="resetPassword()">
    <span id="btnText">Reset Password</span>
    <div class="spinner" id="spinner"></div>
  </button>

  <p class="footer-note"><a href="/">← Back to login</a></p>
</div>

<script>
  function showError(msg) {
    document.getElementById('errorText').textContent = msg;
    document.getElementById('errorAlert').classList.add('show');
    document.getElementById('successAlert').classList.remove('show');
  }

  function showSuccess(msg) {
    document.getElementById('successText').textContent = msg;
    document.getElementById('successAlert').classList.add('show');
    document.getElementById('errorAlert').classList.remove('show');
  }

  async function resetPassword() {
    const email           = document.getElementById('email').value.trim();
    const newPassword     = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const btn             = document.getElementById('submitBtn');
    const spinner         = document.getElementById('spinner');
    const btnText         = document.getElementById('btnText');

    document.getElementById('errorAlert').classList.remove('show');
    document.getElementById('successAlert').classList.remove('show');

    if (!email)       return showError('Please enter your email.');
    if (!newPassword) return showError('Please enter a new password.');
    if (newPassword.length < 6) return showError('Password must be at least 6 characters.');
    if (newPassword !== confirmPassword) return showError('Passwords do not match.');

    btn.disabled = true;
    btnText.textContent = 'Resetting...';
    spinner.style.display = 'block';

    try {
      const res  = await fetch('/api/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, new_password: newPassword })
      });
      const data = await res.json();

      if (data.success) {
        showSuccess(data.message + ' Redirecting to login...');
        setTimeout(() => window.location.href = '/', 2000);
      } else {
        showError(data.message);
        btn.disabled = false;
        btnText.textContent = 'Reset Password';
        spinner.style.display = 'none';
      }
    } catch(err) {
      showError('Could not connect. Please try again.');
      btn.disabled = false;
      btnText.textContent = 'Reset Password';
      spinner.style.display = 'none';
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') resetPassword(); });
</script>
</body>
</html>
