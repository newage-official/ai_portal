<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>New Age — Internal AI Support</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #F5F4F0;
      --surface:      #FFFFFF;
      --surface-2:    #F0EEE9;
      --border:       #E2E0DA;
      --border-strong:#C8C6BF;
      --text:         #1A1916;
      --muted:        #6B6A65;
      --hint:         #9E9C97;
      --accent:       #1A1916;
      --accent-fg:    #FFFFFF;
      --user-bubble:  #1A1916;
      --user-fg:      #FFFFFF;
      --bot-bubble:   #FFFFFF;
      --bot-fg:       #1A1916;
      --radius:       12px;
      --radius-sm:    8px;
      --radius-xs:    6px;
      --shadow:       0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.06);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top navbar ── */
    .navbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 10;
    }

    .navbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: var(--radius-xs);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-mark svg {
      width: 17px;
      height: 17px;
      stroke: #fff;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .brand-name {
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .brand-tag {
      font-size: 0.75rem;
      color: var(--hint);
      font-weight: 400;
      margin-left: 2px;
    }

    .navbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-btn {
      height: 32px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-xs);
      background: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8125rem;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: border-color 0.15s, color 0.15s;
    }

    .nav-btn:hover { border-color: var(--border-strong); color: var(--text); }

    .nav-btn svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .user-pill {
      height: 32px;
      padding: 0 10px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 99px;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.8125rem;
      color: var(--text);
      font-weight: 500;
    }

    .avatar {
      width: 20px;
      height: 20px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.625rem;
      color: #fff;
      font-weight: 600;
    }

    /* ── Main layout ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      padding: 0 1rem;
      overflow: hidden;
    }

    /* ── Messages area ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 0;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Welcome state ── */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 1rem;
    }

    .welcome-icon {
      width: 48px;
      height: 48px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .welcome-icon svg {
      width: 24px;
      height: 24px;
      stroke: var(--muted);
      fill: none;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .welcome h2 {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .welcome p {
      font-size: 0.875rem;
      color: var(--muted);
      max-width: 380px;
      line-height: 1.6;
    }

    /* Suggestion chips */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 0.5rem;
    }

    .chip {
      padding: 7px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      font-size: 0.8125rem;
      color: var(--muted);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .chip:hover {
      border-color: var(--border-strong);
      color: var(--text);
      background: var(--surface-2);
    }

    /* ── Message bubbles ── */
    .msg-row {
      display: flex;
      gap: 10px;
      animation: fadeUp 0.2s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6875rem;
      font-weight: 600;
      margin-top: 2px;
    }

    .msg-avatar.bot {
      background: var(--accent);
      color: #fff;
    }

    .msg-avatar.user-av {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .msg-content { max-width: 72%; display: flex; flex-direction: column; gap: 4px; }
    .msg-row.user .msg-content { align-items: flex-end; }

    .msg-sender {
      font-size: 0.75rem;
      color: var(--hint);
      font-weight: 500;
      padding: 0 4px;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 0.875rem;
      line-height: 1.6;
      word-break: break-word;
    }

    .bubble.bot {
      background: var(--bot-bubble);
      color: var(--bot-fg);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
    }

    .bubble.user {
      background: var(--user-bubble);
      color: var(--user-fg);
      border-top-right-radius: 4px;
    }

    /* Image in bubble */
    .bubble img {
      max-width: 100%;
      border-radius: var(--radius-xs);
      display: block;
      margin-top: 6px;
    }

    .bubble .img-only {
      max-width: 260px;
      border-radius: var(--radius-sm);
    }

    .msg-time {
      font-size: 0.6875rem;
      color: var(--hint);
      padding: 0 4px;
    }

    /* Typing indicator */
    .typing-bubble {
      padding: 12px 16px;
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-top-left-radius: 4px;
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .typing-bubble span {
      width: 6px;
      height: 6px;
      background: var(--hint);
      border-radius: 50%;
      animation: blink 1.2s ease infinite;
    }

    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.85); }
      40%           { opacity: 1;   transform: scale(1); }
    }

    /* ── Image preview bar ── */
    .image-preview-bar {
      display: none;
      padding: 8px 0;
      gap: 8px;
      flex-wrap: wrap;
    }

    .image-preview-bar.visible { display: flex; }

    .img-thumb {
      position: relative;
      width: 60px;
      height: 60px;
    }

    .img-thumb img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: var(--radius-xs);
      border: 1px solid var(--border);
    }

    .img-remove {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 18px;
      height: 18px;
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: 50%;
      font-size: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    /* ── Input area ── */
    .input-area {
      padding: 0.75rem 0 1rem;
      flex-shrink: 0;
    }

    .input-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      transition: border-color 0.15s;
      overflow: hidden;
    }

    .input-box:focus-within { border-color: var(--border-strong); }

    .input-top {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 10px 12px;
    }

    textarea {
      flex: 1;
      border: none;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      color: var(--text);
      background: transparent;
      resize: none;
      min-height: 24px;
      max-height: 160px;
      line-height: 1.6;
      padding: 0;
    }

    textarea::placeholder { color: var(--hint); }

    .input-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px 10px;
      border-top: 1px solid var(--border);
    }

    .input-actions { display: flex; align-items: center; gap: 4px; }

    .action-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: none;
      border-radius: var(--radius-xs);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--hint);
      transition: background 0.15s, color 0.15s;
    }

    .action-btn:hover { background: var(--surface-2); color: var(--muted); }

    .action-btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .send-btn {
      height: 32px;
      padding: 0 14px;
      background: var(--accent);
      color: var(--accent-fg);
      border: none;
      border-radius: var(--radius-xs);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: opacity 0.15s;
    }

    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .send-btn svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .disclaimer {
      text-align: center;
      font-size: 0.6875rem;
      color: var(--hint);
      margin-top: 8px;
    }

    /* ── New chat btn ── */
    #newChatBtn { display: none; }

    /* ── Confidential badge on bot messages ── */
    .conf-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.6875rem;
      color: #B91C1C;
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: 99px;
      padding: 2px 8px;
      margin-top: 4px;
    }

    /* Hidden file input */
    #imageInput { display: none; }

    /* ── NAR inline link ── */
    .nar-inline-link {
      display: inline-block;
      margin-top: 6px;
      color: #4f8ef7;
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
    }
    .nar-inline-link:hover { text-decoration: underline; }

  </style>

</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="navbar-left">
    <img src="https://raw.githubusercontent.com/newage-official/ai_portal/main/static/logo.png" alt="New Age" style="width:32px;height:32px;object-fit:contain;border-radius:8px;" />
    <div>
      <span class="brand-name">New Age</span>
      <span class="brand-tag">/ AI Support</span>
    </div>
  </div>

  <div class="navbar-right">
    <button class="nav-btn" id="newChatBtn" onclick="startNewChat()">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New chat
    </button>
    <div class="user-pill">
      <div class="avatar" id="userAvatar">A</div>
      <span id="userName">Admin</span>
    </div>
    <button class="nav-btn" id="adminBtn" onclick="window.location.href='/admin'" title="Admin Panel" style="display:none">
      <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z"/><path d="M12 8v4l3 3"/></svg>
      Admin
    </button>
    <button class="nav-btn" onclick="window.location.href='/change-password'" title="Change Password">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </button>
    <button class="nav-btn" onclick="logout()" title="Logout">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Logout
    </button>
  </div>
</nav>

<!-- MAIN -->
<div class="main">
  <div class="messages" id="messages">

    <!-- Welcome screen -->
    <div class="welcome" id="welcome">
      <div class="welcome-icon">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <h2>How can I help you today?</h2>
      <p>Ask me anything about New Age — teams, policies, divisions, contacts, or NAR requests.</p>
      <div class="suggestions">
        <button class="chip" onclick="useChip(this)">What is NAR?</button>
        <button class="chip" onclick="useChip(this)">Who should I contact for IT issues?</button>
        <button class="chip" onclick="useChip(this)">What are the office timings?</button>
        <button class="chip" onclick="useChip(this)">How do I submit a reimbursement?</button>
        <button class="chip" onclick="useChip(this)">Tell me about New Age divisions</button>
      </div>
    </div>

  </div>

  <!-- Image preview bar -->
  <div class="image-preview-bar" id="imagePreviewBar"></div>

  <!-- Input area -->
  <div class="input-area">
    <div class="input-box">
      <div class="input-top">
        <textarea
          id="msgInput"
          placeholder="Ask anything about New Age..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
      </div>
      <div class="input-bottom">
        <div class="input-actions">
          <!-- Image upload -->
          <button class="action-btn" title="Attach image" onclick="document.getElementById('imageInput').click()">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          </button>
          <input type="file" id="imageInput" accept="image/*" multiple onchange="handleImages(this)"/>
          <span style="font-size:0.75rem; color:var(--hint); margin-left:4px;">Add image for context</span>
        </div>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
          Send
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
    <p class="disclaimer">New Age AI will not share confidential information such as salary, revenue, or profit.</p>
  </div>
</div>

<script>
  /* ── State ── */
  const pendingImages = []; // { file, dataUrl }
  let isTyping = false;
  let msgCount = 0;

  /* ── Load user from session ── */
  window.addEventListener('DOMContentLoaded', () => {
    // Read user info from sessionStorage (set by login page)
    const savedUser = sessionStorage.getItem('loggedInUser');
    if (!savedUser) {
      // Not logged in — redirect to login page
      window.location.href = '/';
      return;
    }
    const user = JSON.parse(savedUser);
    document.getElementById('userName').textContent = user.name;
    document.getElementById('userAvatar').textContent = user.initials;

    // Show Admin button only for Manager/Admin roles
    const adminRoles = ['Manager', 'Admin', 'HR', 'Operations'];
    if (adminRoles.includes(user.role)) {
      document.getElementById('adminBtn').style.display = '';
    }

    // Enable send on input
    document.getElementById('msgInput').addEventListener('input', updateSendBtn);
  });

  /* ── Enable/disable send button ── */
  function updateSendBtn() {
    const hasText = document.getElementById('msgInput').value.trim().length > 0;
    const hasImg  = pendingImages.length > 0;
    document.getElementById('sendBtn').disabled = !(hasText || hasImg);
  }

  /* ── Auto-resize textarea ── */
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
    updateSendBtn();
  }

  /* ── Handle Enter key ── */
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!document.getElementById('sendBtn').disabled) sendMessage();
    }
  }

  /* ── Image handling ── */
  function handleImages(input) {
    const files = Array.from(input.files);
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = e => {
        pendingImages.push({ file, dataUrl: e.target.result });
        renderImagePreviews();
        updateSendBtn();
      };
      reader.readAsDataURL(file);
    });
    input.value = '';
  }

  function renderImagePreviews() {
    const bar = document.getElementById('imagePreviewBar');
    bar.innerHTML = '';
    if (pendingImages.length === 0) { bar.classList.remove('visible'); return; }
    bar.classList.add('visible');
    pendingImages.forEach((img, i) => {
      const wrap = document.createElement('div');
      wrap.className = 'img-thumb';
      wrap.innerHTML = `<img src="${img.dataUrl}" alt="Preview"/><button class="img-remove" onclick="removeImage(${i})">✕</button>`;
      bar.appendChild(wrap);
    });
  }

  function removeImage(i) {
    pendingImages.splice(i, 1);
    renderImagePreviews();
    updateSendBtn();
  }

  /* ── Send message ── */
  async function sendMessage() {
    const input   = document.getElementById('msgInput');
    const text    = input.value.trim();
    const images  = [...pendingImages];

    if (!text && images.length === 0) return;
    if (isTyping) return;

    // Protection 1: Minimum message length
    if (text && text.length < 3) {
      alert('Please type a proper question!');
      return;
    }

    // Protection 2: Simple cache — avoid duplicate API calls
    const cacheKey = text.trim().toLowerCase();
    if (messageCache[cacheKey]) {
      document.getElementById('welcome') && (document.getElementById('welcome').style.display = 'none');
      document.getElementById('newChatBtn').style.display = 'flex';
      addMessage('user', text, images);
      document.getElementById('msgInput').value = '';
      document.getElementById('msgInput').style.height = 'auto';
      updateSendBtn();
      addMessage('bot', messageCache[cacheKey] + ' *(cached)*');
      return;
    }

    // Hide welcome screen
    document.getElementById('welcome').style.display = 'none';
    document.getElementById('newChatBtn').style.display = 'flex';

    // Render user message
    addMessage('user', text, images);

    // Clear input
    input.value = '';
    input.style.height = 'auto';
    pendingImages.length = 0;
    renderImagePreviews();
    updateSendBtn();

    // Show typing and call Groq API
    showTyping();
    await callGroqAPI(text, images);
  }

  /* ── Add message to DOM ── */
  function addMessage(role, text, images = []) {
    msgCount++;
    const msgs   = document.getElementById('messages');
    const isUser = role === 'user';
    const row    = document.createElement('div');
    row.className = `msg-row ${isUser ? 'user' : ''}`;

    const initials = isUser ? (document.getElementById('userAvatar').textContent || 'U') : 'NA';
    const now  = new Date();
    const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    let imagesHtml = '';
    if (images.length > 0) {
      imagesHtml = images.map(img =>
        `<img src="${img.dataUrl}" alt="Attached image" class="${!text ? 'img-only' : ''}"/>`
      ).join('');
    }

    // Parse NAR suggestion block out of bot reply
    let narCardHtml = '';
    let cleanText   = text;
    if (!isUser) {
      const narStart = text.indexOf(':::nar-suggestion');
      if (narStart !== -1) {
        const jsonStart = text.indexOf('{', narStart);
        // Find closing ::: — if missing, treat end of string as end
        let narEnd = text.indexOf(':::', narStart + 17);
        if (narEnd === -1) narEnd = text.length;
        if (jsonStart !== -1) {
          // Find last } before narEnd
          const jsonEnd = text.lastIndexOf('}', narEnd) + 1;
          const jsonStr = text.slice(jsonStart, jsonEnd).trim();
          try {
            narCardHtml = buildNarCard(JSON.parse(jsonStr));
            cleanText   = text.slice(0, narStart).trim();
          } catch(e) { cleanText = text.slice(0, narStart).trim(); }
        }
      }
    }

    const isConfidential = !isUser && /(is confidential and cannot be shared|cannot share salary|cannot disclose|confidential and cannot)/i.test(cleanText);
    const confidentialBadge = isConfidential
      ? `<span class="conf-badge">⚠ Confidential info not disclosed</span>` : '';

    row.innerHTML = `
      <div class="msg-avatar ${isUser ? 'user-av' : 'bot'}">${initials}</div>
      <div class="msg-content">
        <span class="msg-sender">${isUser ? 'You' : 'New Age AI'}</span>
        <div class="bubble ${isUser ? 'user' : 'bot'}">
          ${cleanText ? `<span>${isUser ? escHtml(cleanText) : renderText(cleanText)}</span>` : ''}
          ${imagesHtml}
        </div>
        ${narCardHtml}
        ${confidentialBadge}
        <span class="msg-time">${time}</span>
      </div>
    `;

    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  /* ── Escape HTML ── */
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  function renderText(str) {
    // Strip NAR suggestion block — handles multiline
    const narStart = str.indexOf(':::nar-suggestion');
    if (narStart !== -1) {
      str = str.slice(0, narStart).trim();
    }
    str = str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    str = str.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    str = str.replace(/^### (.+)$/gm, '<strong>$1</strong>');
    str = str.replace(/^## (.+)$/gm, '<strong>$1</strong>');
    str = str.replace(/^# (.+)$/gm, '<strong>$1</strong>');
    str = str.replace(/\n/g, '<br>');
    return str;
  }

  /* ── Keyword-score a query against NAR types, return top 3 ── */
  function matchNarTypes(query) {
    const q = query.toLowerCase();
    return NAR_TYPES
      .map(n => ({ ...n, score: n.keywords.reduce((s,kw) => s + (q.includes(kw) ? kw.split(' ').length : 0), 0) }))
      .filter(n => n.score > 0)
      .sort((a,b) => b.score - a.score)
      .slice(0, 3);
  }

  /* ══════════════════════════════════════════════
     GROQ AI API
  ══════════════════════════════════════════════ */
  const chatHistory  = [];
  const messageCache = {};

  async function callGroqAPI(userText, images = []) {
    try {
      let userContent = userText || '';

      // Build message with images if present
      let userMessage;
      if (images.length > 0) {
        // Send images as base64 to backend for vision model
        const imageData = images.map(img => ({
          dataUrl: img.dataUrl,
          type: img.file ? img.file.type : 'image/jpeg'
        }));
        userMessage = { role: 'user', content: userContent, images: imageData };
        chatHistory.push({ role: 'user', content: userContent || '[Image attached]' });
      } else {
        userMessage = { role: 'user', content: userContent };
        chatHistory.push({ role: 'user', content: userContent });
      }

      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: chatHistory, current_message: userMessage })
      });

      const data = await response.json();

      if (!data.success) {
        throw new Error(data.message || 'Something went wrong');
      }

      const reply = data.reply;
      console.log('RAW REPLY:', reply);
      chatHistory.push({ role: 'assistant', content: reply });
      if (chatHistory.length > 20) chatHistory.splice(0, 2);

      hideTyping();
      addMessage('bot', reply);

    } catch (err) {
      hideTyping();
      addMessage('bot', `Sorry, I ran into an error: ${err.message}. Please try again.`);
      console.error('Chat API error:', err);
    }
  }
